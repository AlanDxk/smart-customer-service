spring:
  application:
    name: smart-user-service

  # R2DBC 数据源配置
  r2dbc:
    url: r2dbc:mysql://localhost:3306/smart_customer_service?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 1234
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  # Redis配置
  data:
    redis:
      host: 192.168.101.68
      port: 6379
      password: redis
      database: 10

  # Nacos配置（合并到这里）
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos

server:
  port: 8083

# JWT配置
jwt:
    secret: smart-customer-service-secret-key-2024
    access-token-expiration: 7200000      # 2小时
    refresh-token-expiration: 604800000   # 7天

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,user-service
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    org.example.smart.user: DEBUG
springdoc:
  swagger-ui:
    path: /swagger-ui.html          # Swagger UI 访问路径
  api-docs:
    path: /v3/api-docs