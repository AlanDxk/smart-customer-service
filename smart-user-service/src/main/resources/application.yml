spring:
  application:
    name: smart-user-service

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/smart_customer_service?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  # H2控制台配置（开发环境）
  h2:
    console:
      enabled: false
      path: /h2-console

  # Redis配置
  data:
    redis:
      host: 192.168.101.68
      port: 6379
      password: redis
      database: 10

  # Nacos配置（合并到这里）
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos

server:
  port: 8083

# JWT配置
jwt:
    secret: smart-customer-service-secret-key-for-jwt-token-generation
    access-token-expiration: 7200000      # 2小时
    refresh-token-expiration: 604800000   # 7天

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,user-service
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    org.example.smart.user: DEBUG
springdoc:
  swagger-ui:
    path: /swagger-ui.html          # Swagger UI 访问路径
  api-docs:
    path: /v3/api-docs