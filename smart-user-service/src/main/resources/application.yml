spring:
  application:
    name: smart-user-service

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/smart_customer_service?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  # H2控制台配置（开发环境）
  h2:
    console:
      enabled: false
      path: /h2-console

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

server:
  port: 8083

# Eureka配置
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# JWT配置
jwt:
  secret: smart-customer-service-secret-key-for-jwt-token-generation
  expiration: 86400000 # 24小时

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,user-service
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    org.example.smart.user: DEBUG