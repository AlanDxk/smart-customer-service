spring:
  application:
    name: smart-ticket-service

  # R2DBC 数据源配置
  r2dbc:
    url: r2dbc:mysql://localhost:3306/smart_customer_service?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 1234
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  # Redis配置
  data:
    redis:
      host: 192.168.101.68
      port: 6379
      password: redis
      database: 0

  session:
    store-type: redis
    redis:
      namespace: smart-ticket-service

  # Nacos配置
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos

  # 禁用 Security 自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.rsocket.RSocketSecurityAutoConfiguration

server:
  port: 8082

# JWT配置
jwt:
  secret: smart-customer-service-secret-key-for-jwt-token-generation
  access-token-expiration: 7200000      # 2小时
  refresh-token-expiration: 604800000   # 7天
  renewal-threshold-minutes: 30         # 续约阈值（分钟）

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,ticket-service
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    org.example.smart.ticket: DEBUG

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs