spring:
  application:
    name: smart-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # AI服务路由
        - id: smart-ai-service
          uri: lb://smart-ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1

        # 工单服务路由
        - id: smart-ticket-service
          uri: lb://smart-ticket-service
          predicates:
            - Path=/api/tickets/**


        # 用户服务路由
        - id: smart-user-service
          uri: lb://smart-user-service
          predicates:
            - Path=/api/users/**


        # Swagger UI 路由（聚合所有微服务的 API 文档）
        - id: smart-user-service-swagger
          uri: lb://smart-user-service
          predicates:
            - Path=/swagger-ui/**,/swagger-ui.html,/v3/api-docs/**,/swagger-resources/**,/webjars/**,/api-docs/**


      # CORS 全局配置（处理OPTIONS预检请求）
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedHeaders: "*"
            allowedMethods: "*"
            allowCredentials: true

      # 限流配置
#      default-filters:
#        - name: RequestRateLimiter
#          args:
#            redis-rate-limiter.replenishRate: 100
#            redis-rate-limiter.burstCapacity: 200
#            redis-rate-limiter.requestedTokens: 1
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos

  # Redis配置
  data:
    redis:
      host: 192.168.101.68
      port: 6379
      password: redis
      database: 10

server:
  port: 8080

# Nacos配置

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

# JWT配置
jwt:
  secret: smart-customer-service-secret-key-2024
  access-token-expiration: 72  # 2小时，单位：毫秒
  refresh-token-expiration: 604800000  # 7天，单位：毫秒