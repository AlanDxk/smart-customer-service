spring:
  application:
    name: smart-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # AI服务路由
        - id: smart-ai-service
          uri: lb://smart-ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1

        # 工单服务路由
        - id: smart-ticket-service
          uri: lb://smart-ticket-service
          predicates:
            - Path=/api/ticket/**
          filters:
            - StripPrefix=1

        # 用户服务路由
        - id: smart-user-service
          uri: lb://smart-user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

      # 限流配置
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos

  # Redis配置
  data:
    redis:
      host: 192.168.101.68
      port: 6379
      password: redis
      database: 0

server:
  port: 8080

# Nacos配置

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

# JWT配置
jwt:
  secret: smart-customer-service-secret-key-2024
  access-token-expiration: 7200000  # 2小时，单位：毫秒
  refresh-token-expiration: 604800000  # 7天，单位：毫秒