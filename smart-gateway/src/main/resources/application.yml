spring:
  application:
    name: smart-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # AI服务路由
        - id: smart-ai-service
          uri: lb://smart-ai-service
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1

        # 工单服务路由
        - id: smart-ticket-service
          uri: lb://smart-ticket-service
          predicates:
            - Path=/api/ticket/**
          filters:
            - StripPrefix=1

        # 用户服务路由
        - id: smart-user-service
          uri: lb://smart-user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

      # 限流配置
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

server:
  port: 8080

# Eureka配置
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG